"$schema" = "https://conductor.build/schemas/settings.schema.json"
enterprise_data_privacy = true

[git]
branch_prefix = "bo"
delete_branch_on_archive = true

[models]
default = "opus-4-8-1m"
review = "gpt-5.5"

[models.codex]
default_thinking_level = "high"
review_thinking_level = "high"

# Custom prompts layered onto Conductor's built-in actions. These mirror the
# conventions in ai/global.md and the writing-prs-and-commits skill.
[prompts]
code_review = """
Prioritize correctness, behavior changes, error handling, and missing or weak \
test coverage; flag security issues. Lead with real bugs and risky changes — \
keep style nitpicks to a minimum. Be concrete: cite the file and line and \
explain why it matters rather than restating the diff.
"""

create_pr = """
Title format: `type/domain: imperative summary` where type is one of \
feat, fix, chore, refactor, docs, test, or perf. Write the description as prose \
that leads with WHY the change is needed, then WHAT changed. Default to a draft \
PR with no reviewers. Add a `## Test Plan` only when there is meaningful \
validation worth reporting. Never add AI attribution — no "Generated by" lines \
and no Co-Authored-By trailers.
"""

resolve_merge_conflicts = """
Preserve the intent of both sides — never drop or flatten changes just to make \
the conflict disappear. When the two sides genuinely diverge, prefer the \
incoming/base-branch change unless the local side is clearly the newer intent, \
and call out anything ambiguous rather than guessing. After resolving, build \
and run the narrowest relevant tests to confirm nothing broke.
"""

tool_approvals_enabled = true
