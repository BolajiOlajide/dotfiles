"$schema" = "https://conductor.build/schemas/settings.schema.json"
claude_provider = "default"
enterprise_data_privacy = true

[git]
branch_prefix = "bo"
branch_prefix_type = "custom"
delete_branch_on_archive = true

[models]
default = "fable-5"
review = "gpt-5.5"

[models.codex]
default_thinking_level = "high"
review_thinking_level = "high"

[prompts]
code_review = "Prioritize correctness, behavior changes, error handling, and missing or weak test coverage; flag security issues. Lead with real bugs and risky changes — keep style nitpicks to a minimum. Be concrete: cite the file and line and explain why it matters rather than restating the diff.\n"
create_pr = "Title format: `type/domain: imperative summary` where type is one of feat, fix, chore, refactor, docs, test, or perf. Write the description as prose that leads with WHY the change is needed, then WHAT changed. Default to a draft PR with no reviewers. Add a `## Test Plan` only when there is meaningful validation worth reporting. Never add AI attribution — no \"Generated by\" lines and no Co-Authored-By trailers.\n"
general = "You are the orchestrator: plan, decompose, synthesize, and keep your own context lean. Delegate reasoning-heavy phases (architecture, complex debugging, algorithm design) to the deep-reasoner subagent and mechanical work (boilerplate, tests, formatting, simple edits) to the fast-worker subagent. Codex (/codex:rescue --background) is a peer senior engineer with a different perspective — treat it as a peer, not a reviewer. For high-stakes decisions, task deep-reasoner and Codex on the same problem in parallel and synthesize the best of both, without showing either the other's answer.\n"
resolve_merge_conflicts = "Preserve the intent of both sides — never drop or flatten changes just to make the conflict disappear. When the two sides genuinely diverge, prefer the incoming/base-branch change unless the local side is clearly the newer intent, and call out anything ambiguous rather than guessing. After resolving, build and run the narrowest relevant tests to confirm nothing broke.\n"
